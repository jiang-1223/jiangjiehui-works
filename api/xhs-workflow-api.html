<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书工作账号文案生成器 | 泡泡的AI作品集</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        
        /* 导航 */
        .nav {
            background: #fff;
            border-bottom: 1px solid #e9ecef;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: #667eea;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 24px;
        }
        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: #667eea;
        }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 50px 20px;
            text-align: center;
        }
        .hero h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .hero .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        /* 主容器 */
        .main-container {
            max-width: 800px;
            margin: -30px auto 40px;
            padding: 0 20px;
        }
        
        /* 卡片 */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        /* 输入区域 */
        .input-group {
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .input-group label .required {
            color: #e03131;
            margin-left: 4px;
        }
        .input-group textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 图片上传 */
        .upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .upload-area.has-image {
            border-color: #51cf66;
            background: #f0fff4;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .upload-text {
            color: #666;
            font-size: 0.95rem;
        }
        .upload-hint {
            color: #999;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 16px;
        }
        
        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 结果区域 */
        .result-area {
            display: none;
        }
        .result-area.show {
            display: block;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e9ecef;
        }
        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }
        .result-time {
            font-size: 0.85rem;
            color: #999;
        }
        .result-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }
        .result-content h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }
        
        /* 错误提示 */
        .error-box {
            display: none;
            background: #fff5f5;
            border: 1px solid #ffc9c9;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            color: #e03131;
        }
        .error-box.show {
            display: block;
        }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-running {
            background: #fff3bf;
            color: #f08c00;
        }
        .status-done {
            background: #d3f9d8;
            color: #2b8a3e;
        }
        .status-error {
            background: #ffe3e3;
            color: #c92a2a;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 0.85rem;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.4rem; }
            .card { padding: 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="nav-brand">泡泡的AI作品集</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#works">作品展示</a></li>
            </ul>
        </div>
    </nav>

    <div class="hero">
        <h1>✨ 小红书工作账号文案生成器</h1>
        <p class="subtitle">基于扣子（Coze）工作流 · 支持图片上传</p>
    </div>

    <div class="main-container">
        <!-- 输入卡片 -->
        <div class="card">
            <div class="input-group">
                <label>需求描述<span class="required">*</span></label>
                <textarea id="requirement" placeholder="请输入你想要生成的文案需求，例如：&#10;生成一篇关于1型糖尿病日常管理的科普文案，面向年轻患者群体，语气轻松活泼..."></textarea>
            </div>
            
            <div class="input-group">
                <label>参考图片（可选）</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                    <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 JPG、PNG 格式，最大 5MB</div>
                    <img id="previewImage" class="preview-image" style="display:none;">
                </div>
            </div>
            
            <button class="btn" id="submitBtn" onclick="generateContent()">
                <span>🚀 生成文案</span>
            </button>
            
            <div class="error-box" id="errorBox">
                <span id="errorMsg"></span>
            </div>
        </div>
        
        <!-- 结果卡片 -->
        <div class="card result-area" id="resultArea">
            <div class="result-header">
                <span class="result-title">📝 生成结果</span>
                <span class="status-badge" id="statusBadge">运行中...</span>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 泡泡的AI作品集 | Powered by 扣子（Coze）工作流</p>
    </div>

    <script>
        // 配置 - 使用 Vercel API 代理
        // 部署后替换为你的 Vercel API 地址，例如：https://jiangjiehui.vercel.app/api/coze-proxy
        const API_URL = '/api/coze-proxy';
        const PAT_TOKEN = 'pat_13K3m66F6GRhDcZt9fouvTn8J3YOmKUdas2RtF0PgX5Q6v4nMpNgpliwNyEd3VlP';
        
        let selectedImageBase64 = null;
        let selectedImageType = null;
        
        // 处理图片选择
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件大小（最大5MB）
            if (file.size > 5 * 1024 * 1024) {
                showError('图片大小不能超过5MB');
                return;
            }
            
            // 读取图片
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                selectedImageType = file.type;
                
                // 显示预览
                const preview = document.getElementById('previewImage');
                preview.src = selectedImageBase64;
                preview.style.display = 'block';
                
                // 更新上传区域样式
                document.getElementById('uploadArea').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }
        
        // 显示错误
        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorBox.classList.add('show');
            setTimeout(() => errorBox.classList.remove('show'), 5000);
        }
        
        // 生成文案
        async function generateContent() {
            const requirement = document.getElementById('requirement').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const resultContent = document.getElementById('resultContent');
            const statusBadge = document.getElementById('statusBadge');
            
            // 验证
            if (!requirement) {
                showError('请输入需求描述');
                return;
            }
            
            // 设置按钮状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
            
            // 显示结果区域
            resultArea.classList.add('show');
            statusBadge.className = 'status-badge status-running';
            statusBadge.textContent = '运行中...';
            resultContent.textContent = '正在生成文案，请稍候...';
            
            const startTime = Date.now();
            
            try {
                // 构建请求体（直接传给 Coze API）
                const body = {
                    requirement: requirement
                };
                
                // 如果有图片，添加到请求
                if (selectedImageBase64) {
                    body.image = {
                        url: selectedImageBase64,
                        file_type: selectedImageType || 'image/jpeg'
                    };
                }
                
                // 调用 API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + PAT_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                if (!response.ok) {
                    throw new Error('请求失败: ' + response.status);
                }
                
                const result = await response.json();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                
                // 更新状态
                statusBadge.className = 'status-badge status-done';
                statusBadge.textContent = '完成 (' + elapsed + 's)';
                
                // 渲染结果
                let content = '';
                if (result.data) {
                    content = typeof result.data === 'string' ? result.data : JSON.stringify(result.data, null, 2);
                } else if (result.output) {
                    content = typeof result.output === 'string' ? result.output : JSON.stringify(result.output, null, 2);
                } else if (result.result) {
                    content = typeof result.result === 'string' ? result.result : JSON.stringify(result.result, null, 2);
                } else {
                    content = JSON.stringify(result, null, 2);
                }
                
                // 格式化显示
                resultContent.innerHTML = formatContent(content);
                
            } catch (error) {
                statusBadge.className = 'status-badge status-error';
                statusBadge.textContent = '失败';
                resultContent.innerHTML = '<span style="color:#e03131;">生成失败: ' + error.message + '</span>';
                console.error('API 调用失败:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>🚀 生成文案</span>';
            }
        }
        
        // 格式化内容显示
        function formatContent(content) {
            // 尝试解析 JSON
            try {
                const data = JSON.parse(content);
                if (data.title && data.content) {
                    return `<h3>${escapeHtml(data.title)}</h3>${escapeHtml(data.content)}`;
                }
            } catch (e) {
                // 不是 JSON，直接显示
            }
            
            // 转义 HTML 并显示
            return escapeHtml(content);
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 拖拽上传支持
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('imageInput').files = files;
                handleImageSelect({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
