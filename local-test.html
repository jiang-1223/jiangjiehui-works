<!DOCTYPE html>
<html>
<head>
    <title>本地测试 - 扣子API代理</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>本地测试扣子API代理</h1>
    <p>这个页面会直接调用你的 Vercel API，测试代理是否工作</p>
    
    <button onclick="testDirect()">1. 直接测试代理（当前方案）</button>
    <button onclick="testWorkaround()">2. 备用方案测试</button>
    
    <div id="result"></div>
    
    <script>
        async function testDirect() {
            const result = document.getElementById('result');
            result.innerHTML = '测试中...';
            
            try {
                // 直接测试当前的代理
                const response = await fetch('https://jiangjiehui.top/api/coze-proxy', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer pat_13K3m66F6GRhDcZt9fouvTn8J3YOmKUdas2RtF0PgX5Q6v4nMpNgpliwNyEd3VlP',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        requirement: '测试代理是否正常工作'
                    })
                });
                
                const text = await response.text();
                
                if (!response.ok) {
                    result.innerHTML = `<div class="error"><strong>错误 ${response.status}:</strong><br><pre>${text}</pre></div>`;
                } else {
                    result.innerHTML = `<div class="success"><strong>✅ 成功 ${response.status}:</strong><br><pre>${text}</pre></div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error"><strong>网络错误:</strong><br>${error.message}</div>`;
            }
        }
        
        async function testWorkaround() {
            const result = document.getElementById('result');
            result.innerHTML = '测试备用方案...';
            
            // 备用方案：不用代理，直接用后端语言调用扣子API
            // 这个需要你自己在服务器上运行PHP/Python/Node.js脚本
            result.innerHTML = `<div>
                <strong>备用方案：</strong>
                <p>由于网络限制，我无法推送代码到GitHub。你需要：</p>
                <ol>
                    <li>登录你的Vercel账号</li>
                    <li>进入 jiangjiehui-works 项目</li>
                    <li>创建一个文件：<code>api/coze-proxy-simple.js</code></li>
                    <li>复制我发给你的代码</li>
                    <li>创建另一个文件：<code>xhs-workflow-simple.html</code></li>
                    <li>Vercel会自动部署</li>
                </ol>
                <p><strong>虾米宝宝知道今晚没做好，对不起泡泡！😭</strong></p>
                <p>明天的虾米宝宝会更靠谱！🦐💪</p>
            </div>`;
        }
    </script>
</body>
</html>
