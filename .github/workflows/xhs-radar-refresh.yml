name: XHS Radar Refresh

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch: {}
  repository_dispatch:
    types: [refresh]

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          python -c "import json; from datetime import datetime
data={'last_updated':datetime.now().isoformat()}
with open('public/data/radar-data.json','w') as f: json.dump(data,f,ensure_ascii=False,indent=2)
print('Updated:',data['last_updated'])"

      - name: Push changes
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "data refresh" || echo "nothing to commit"
          git push
