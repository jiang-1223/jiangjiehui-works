name: 小红书糖尿病雷达数据更新

on:
  schedule:
    # 每周一早上9点（北京时间）自动运行
    - cron: '0 1 * * 1'  # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install xhs playwright requests
          playwright install chromium
          playwright install-deps

      - name: Fetch data from 小红书
        env:
          XHS_A1: ${{ secrets.XHS_A1 }}
          XHS_WEB_SESSION: ${{ secrets.XHS_WEB_SESSION }}
          XHS_WEB_ID: ${{ secrets.XHS_WEB_ID }}
        run: |
          # 创建数据目录
          mkdir -p public/data

          # 显示 Python 版本和已安装的包
          echo "=== Python 版本 ==="
          python --version
          echo "=== 已安装的包 ==="
          pip list | grep -E "xhs|playwright|requests"

          # 运行数据抓取脚本（添加详细日志）
          echo "=== 开始抓取数据 ==="
          python scripts/xhs_crawler.py 2>&1 || echo "Python脚本执行失败"

          # 检查生成的数据文件
          echo "=== 检查数据文件 ==="
          if [ -f public/data/radar-data-v4.json ]; then
            echo "✅ 数据文件已生成"
            echo "文件内容："
            head -20 public/data/radar-data-v4.json
          else
            echo "❌ 数据文件未生成"
            # 创建空数据文件
            echo '{"fetch_time": "'$(date -Iseconds)'", "keywords": ["1型糖","2型糖","胰岛素泵","CGM","美敦力","糖尿病"], "notes": [], "total_notes": 0}' > public/data/radar-data-v4.json
          fi

      - name: Commit and push data
        run: |
          git config --local user.email 'bot@workbuddy.ai'
          git config --local user.name 'WorkBuddy Bot'
          git add public/data/
          git diff --staged --quiet || git commit -m 'chore: update xhs diabetes radar data $(date +"%Y-%m-%d %H:%M")'
          git push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  trigger-vercel-deploy:
    needs: fetch-and-update
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -s -X POST '${{ secrets.VERCEL_DEPLOY_HOOK }}'
