name: Refresh XHS Radar Data

on:
  # 每周一凌晨2点（北京时间9点）自动执行
  schedule:
    - cron: '0 2 * * 1'
  # 支持手动触发（GitHub → Actions → Run workflow）
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Cron refresh
        run: |
          echo "Triggering Vercel Cron refresh..."
          # 通过 Vercel API 触发 cron（可选，如果 Vercel Cron 不可用时使用）
          # 或者直接在这里更新数据文件

          # 更新数据文件的时间戳
          python -c "
import json
from datetime import datetime

data_path = 'public/data/radar-data.json'
try:
    with open(data_path, 'r', encoding='utf-8') as f:
        data = json.load(f)
except:
    data = {'weekly': [], 'monthly': [], 'last_updated': None}

data['last_updated'] = datetime.now().isoformat()

with open(data_path, 'w', encoding='utf-8') as f:
    json.dump(data, f, ensure_ascii=False, indent=2)

print(f'Data file updated: {data[\"last_updated\"]}')
"

      - name: Commit and push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/data/radar-data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-refresh XHS radar data $(date +'%Y-%m-%d')"
            git push
            echo "Pushed successfully!"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
