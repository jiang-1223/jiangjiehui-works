name: Refresh XHS Radar Data

on:
  # 每周一凌晨1点自动运行
  schedule:
    - cron: '0 1 * * 1'
  # 手动触发
  workflow_dispatch:
    inputs:
      force:
        description: '强制刷新数据'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check freshness
        id: freshness
        run: |
          import os, json, pathlib
          force = os.environ.get('FORCE_REFRESH','').lower() == 'true'
          path = pathlib.Path('public/data/radar-data.json')
          needs = 'true'
          if not force and path.exists():
            with open(path) as f:
              d = json.load(f)
            updated = d.get('updated_at', '')
            print(f'现有数据更新时间: {updated}')
            if updated:
              needs = 'false'
              print('数据已足够新，跳过更新')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'needs_refresh={needs}\n')
          print(f'needs_refresh={needs}')

      - name: Run scraper
        if: steps.freshness.outputs.needs_refresh == 'true'
        run: python scripts/scrape_xhs.py
        env:
          FORCE_REFRESH: ${{ inputs.force || false }}

      - name: Commit & Push
        if: steps.freshness.outputs.needs_refresh == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: refresh XHS radar data $(date +'%Y-%m-%d')"
            git push
          fi
