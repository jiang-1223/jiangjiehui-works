*{margin:0;padding:0;box-sizing:border-box}
:root{

body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header .subtitle{color:var(--dim);font-size:.95rem;margin-bottom:16px}
.header .tags span{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem;margin:3px;
  background:rgba(102,126,234,.15);color:var(--accent);border:1px solid rgba(102,126,234,.3)}

/* Stats Bar */
.stats{display:flex;justify-content:center;gap:20px;padding:20px;flex-wrap:wrap}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:140px;
  border:1px solid rgba(255,255,255,.05)}
.stat-card .num{font-size:1.8rem;font-weight:700}
.stat-card .label{font-size:.8rem;color:var(--dim);margin-top:4px}
.stat-card.accent .num{color:var(--accent)}
.stat-card.green .num{color:var(--green)}
.stat-card.pink .num{color:var(--pink)}
.stat-card.blue .num{color:var(--blue)}

/* Charts */
.charts{display:flex;justify-content:center;gap:30px;padding:20px;flex-wrap:wrap}
.chart-box{background:var(--card);border-radius:var(--radius);padding:20px;
  border:1px solid rgba(255,255,255,.05)}
.chart-box h3{font-size:.9rem;color:var(--dim);margin-bottom:12px;text-align:center}

/* Overall Progress */
.overall-progress{max-width:600px;margin:10px auto 20px;padding:0 20px}
.progress-bar-bg{background:var(--card);border-radius:20px;height:24px;overflow:hidden;position:relative}
.progress-bar-fill{height:100%;border-radius:20px;
  background:linear-gradient(90deg,var(--accent),var(--pink),var(--green));
  transition:width .5s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;
  font-size:.75rem;font-weight:600;color:#fff;min-width:40px}

/* Week Section */
.week-section{max-width:900px;margin:0 auto 30px;padding:0 20px}
.week-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:8px;
  border-bottom:2px solid rgba(255,255,255,.08)}
.week-badge{padding:6px 16px;border-radius:20px;font-size:.85rem;font-weight:600;color:#fff}
.week-title{font-size:1.1rem;font-weight:600}
.week-goal{font-size:.8rem;color:var(--dim)}
.week-stats{margin-left:auto;font-size:.8rem;color:var(--dim)}
.week-stats .done-count{color:var(--green);font-weight:600}

/* Day Card */
.day-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;
  border:1px solid rgba(255,255,255,.05);transition:all .2s}
.day-card:hover{border-color:rgba(102,126,234,.3)}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.day-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0}
.day-title{font-size:.95rem;font-weight:600;flex:1}
.day-date{font-size:.75rem;color:var(--dim)}
.day-progress{width:80px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;flex-shrink:0}
.day-progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* Task List */
.task-list{margin-left:46px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:.9rem;cursor:pointer;
  user-select:none;transition:opacity .2s}
.task-item:hover{opacity:.8}
.task-checkbox{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.task-checkbox.checked{border-color:var(--green);background:var(--green)}
.task-checkbox.checked::after{content:'✓';color:#fff;font-size:.7rem;font-weight:700}
.task-text{flex:1;line-height:1.5}
.task-text.done{text-decoration:line-through;color:var(--dim)}

  border-radius:8px;font-size:.85rem;border-left:3px solid var(--accent)}

.deliverable .del-text{color:var(--accent);font-weight:500}
.deliverable .del-status{float:right;font-size:.75rem;padding:2px 8px;border-radius:10px}
.deliverable .del-status.pending{background:rgba(255,193,7,.15);color:#ffc107}
.deliverable .del-status.submitted{background:rgba(67,233,123,.15);color:var(--green);cursor:pointer}
.deliverable .del-status.submitted:hover{opacity:.7}

.sync-area{text-align:center;padding:30px 20px}
.sync-btn{padding:12px 32px;border-radius:25px;border:none;font-size:1rem;font-weight:600;
  cursor:pointer;color:#fff;

.sync-btn:active{transform:translateY(0)}
.sync-status{margin-top:10px;font-size:.85rem;color:var(--dim)}

/* Footer */
.footer{text-align:center;padding:40px 20px;color:var(--dim);font-size:.8rem;border-top:1px solid rgba(255,255,255,.05)}

@media(max-width:600px){

const STORAGE_KEY = 'bubble_ai_plan_progress';

const WEEK_COLORS = ['#667eea','#f093fb','#4facfe','#43e97b'];

function loadProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}
  catch(e){return{}}
}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}

function getStats(){
  const progress = loadProgress();
  let totalTasks=0, doneTasks=0, totalDays=0, doneDays=0;
  let totalDels=0, submittedDels=0;
  const weekStats = PLAN.weeks.map(w=>{
    let wt=0,wd=0,dd=0,sd=0;
    w.days.forEach(d=>{
      totalDays++;
      let dayDone=0, dayTotal=0;
      d.tasks.forEach(t=>{dayTotal++;wt++;if(progress[t.id]){dayDone++;wd++}});
      if(dayDone===dayTotal && dayTotal>0) doneDays++;
      totalDels++; if(progress['del_'+d.day]) submittedDels++;
      dd++; if(progress['del_'+d.day]) sd++;
    });
    return {total:wt,done:wd,dels:dd,submitted:sd};
  });
  totalTasks=weekStats.reduce((s,w)=>s+w.total,0);
  doneTasks=weekStats.reduce((s,w)=>s+w.done,0);
  totalDels=weekStats.reduce((s,w)=>s+w.dels,0);
  submittedDels=weekStats.reduce((s,w)=>s+w.submitted,0);
  return {totalTasks,doneTasks,totalDays,doneDays,totalDels,submittedDels,weekStats};
}

function toggleTask(taskId){
  const p=loadProgress();
  p[taskId]=!p[taskId];
  saveProgress(p);render();
}

function toggleDeliverable(day){
  const p=loadProgress();
  p['del_'+day]=!p['del_'+day];
  saveProgress(p);render();
}

function renderStats(){
  const s=getStats();
  const pct=s.totalTasks?Math.round(s.doneTasks/s.totalTasks*100):0;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card accent"><div class="num">${s.totalTasks}</div><div class="label">总任务数</div></div>
    <div class="stat-card green"><div class="num">${s.doneTasks}</div><div class="label">已完成</div></div>
    <div class="stat-card pink"><div class="num">${pct}%</div><div class="label">总进度</div></div>
    <div class="stat-card blue"><div class="num">${s.submittedDels}/${s.totalDels}</div><div class="label">作品提交</div></div>`;
  document.getElementById('overallBar').style.width=pct+'%';
  document.getElementById('overallBar').textContent=pct+'%';
}

function renderWeeks(){
  const p=loadProgress();
  const el=document.getElementById('weekSections');
  el.innerHTML='';
  PLAN.weeks.forEach((w,wi)=>{
    const ws=getStats().weekStats[wi];
    const wPct=ws.total?Math.round(ws.done/ws.total*100):0;
    const sec=document.createElement('div');
    sec.className='week-section';
    sec.innerHTML=`<div class="week-header">
      <span class="week-badge" style="background:${WEEK_COLORS[wi]}">第${w.week}周</span>
      <span class="week-title">${w.title}</span>
      <span class="week-goal">${w.goal}</span>
      <span class="week-stats"><span class="done-count">${ws.done}</span>/${ws.total} 任务 · ${wPct}%</span>
    </div>`;
    w.days.forEach(d=>{
      let dDone=0; d.tasks.forEach(t=>{if(p[t.id])dDone++});
      const dPct=d.tasks.length?Math.round(dDone/d.tasks.length*100):0;
      const allDone=dDone===d.tasks.length;
      const delSubmitted=p['del_'+d.day];
      const card=document.createElement('div');
      card.className='day-card';
      card.innerHTML=`<div class="day-header">
        <div class="day-num" style="background:${allDone?'var(--green)':WEEK_COLORS[wi]}">${d.day}</div>
        <div class="day-title" style="${allDone?'color:var(--green)':''}">${d.title}</div>
        <div class="day-date">${d.date}</div>
        <div class="day-progress"><div class="day-progress-fill" style="width:${dPct}%;background:${WEEK_COLORS[wi]}"></div></div>
      </div>
      <div class="task-list">${d.tasks.map(t=>`
        <div class="task-item" onclick="toggleTask('${t.id}')">
          <div class="task-checkbox ${p[t.id]?'checked':''}"></div>
          <div class="task-text ${p[t.id]?'done':''}">${t.text}</div>
        </div>`).join('')}
      </div>
      <div class="deliverable">
        <span class="del-label">📦 交付物</span>
        <span class="del-text">${d.deliverable}</span>
        <span class="del-status ${delSubmitted?'submitted':'pending'}" onclick="event.stopPropagation();toggleDeliverable(${d.day})">
          ${delSubmitted?'✓ 已提交':'点击提交'}
        </span>
      </div>`;
      sec.appendChild(card);
    });
    el.appendChild(sec);
  });
}

let weekChartInst, donutChartInst, typeChartInst;

function renderCharts(){
  const s=getStats();
  // Week progress bar chart
  if(weekChartInst) weekChartInst.destroy();
  weekChartInst=new Chart(document.getElementById('weekChart'),{
    type:'bar',
    data:{labels:PLAN.weeks.map(w=>'第'+w.week+'周'),
      datasets:[{label:'完成',data:s.weekStats.map(w=>w.done),
        backgroundColor:WEEK_COLORS,borderRadius:6,barPercentage:.5},
        {label:'总数',data:s.weekStats.map(w=>w.total-w.done),
        backgroundColor:WEEK_COLORS.map(c=>c+'33'),borderRadius:6,barPercentage:.5}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#888'},grid:{display:false}},
        y:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,.05)'}}}}
  });
  // Donut chart
  const remaining=s.totalTasks-s.doneTasks;
  if(donutChartInst) donutChartInst.destroy();
  donutChartInst=new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{labels:['已完成','进行中'],datasets:[{data:[s.doneTasks,remaining],
      backgroundColor:['#43e97b','rgba(255,255,255,.08)'],borderWidth:0}]},
    options:{responsive:true,cutout:'70%',plugins:{legend:{position:'bottom',labels:{color:'#888',padding:10}}}}
  });
  // Capability radar chart
  const dims=['AI应用理解','数据分析','产品思维','AI实战案例','自动化能力','内容创作'];
  const vals=[65,40,30,75,80,55]; // base scores adjusted by completed tasks
  // Adjust based on actual progress
  if(s.weekStats[0]) vals[0]=Math.min(100,65+s.weekStats[0].done*5);
  if(s.weekStats[1]) {vals[1]=Math.min(100,40+s.weekStats[1].done*5);vals[5]=Math.min(100,55+s.weekStats[1].done*4);}
  if(s.weekStats[2]) {vals[2]=Math.min(100,30+s.weekStats[2].done*5);vals[1]=Math.min(100,vals[1]+s.weekStats[2].done*2);}
  if(s.weekStats[3]) vals[3]=Math.min(100,75+s.weekStats[3].done*3);
  vals[4]=Math.min(100,80+s.doneTasks);
  if(typeChartInst) typeChartInst.destroy();
  typeChartInst=new Chart(document.getElementById('typeChart'),{
    type:'radar',
    data:{labels:dims,datasets:[{label:'能力值',data:vals,
      backgroundColor:'rgba(102,126,234,.2)',borderColor:'#667eea',pointBackgroundColor:'#667eea',pointRadius:4}]},
    options:{responsive:true,scales:{r:{beginAtZero:true,max:100,
      ticks:{display:false},grid:{color:'rgba(255,255,255,.1)'},
      pointLabels:{color:'#aaa',font:{size:11}}}},
      plugins:{legend:{display:false}}}
  });
}

function render(){
  renderStats();renderWeeks();renderCharts();
  document.getElementById('lastUpdate').textContent=new Date().toLocaleString('zh-CN');
}

function syncToSite(){
  document.getElementById('syncStatus').textContent='⏳ 正在同步...';
  // This will be handled by the Python script
  // In browser context, we save progress and show message
  const p=loadProgress();
  const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='progress.json';
  a.click();
  document.getElementById('syncStatus').textContent='✅ 进度已导出！请运行 python sync_plan.py 同步到网站';
}

// Init
render();
