<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书糖尿病爆款雷达</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --secondary: #EC4899;
            --bg-dark: #0F0A1A;
            --bg-card: rgba(30, 20, 50, 0.8);
            --text-primary: #FFFFFF;
            --text-secondary: #A78BFA;
            --accent: #F472B6;
            --gradient: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top right, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
            margin-bottom: 30px;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo h1 {
            font-size: 24px; font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions { display: flex; gap: 12px; align-items: center; }
        .update-time { font-size: 14px; color: var(--text-secondary); }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 500; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4); }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card); border-radius: 16px; padding: 24px;
            border: 1px solid rgba(124, 58, 238, 0.2); backdrop-filter: blur(10px);
        }
        .stat-card .label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-card .value {
            font-size: 32px; font-weight: 700;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Chart Section */
        .chart-section {
            background: var(--bg-card); border-radius: 16px; padding: 24px;
            margin-bottom: 30px; border: 1px solid rgba(124, 58, 238, 0.2);
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }
        .chart-container { height: 300px; position: relative; }

        /* Filter Bar */
        .filter-bar {
            background: var(--bg-card); border-radius: 16px; padding: 20px;
            margin-bottom: 20px; border: 1px solid rgba(124, 58, 238, 0.2);
            display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .filter-label { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }
        .filter-btn {
            padding: 8px 16px; background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 8px;
            color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: all 0.3s ease;
        }
        .filter-btn.active { background: var(--gradient); color: white; border-color: transparent; }
        .filter-btn:hover { background: rgba(124, 58, 237, 0.2); }
        .sort-select, .time-select {
            padding: 8px 16px; background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 8px;
            color: var(--text-primary); font-size: 14px; cursor: pointer;
        }

        /* Notes List */
        .notes-section {
            background: var(--bg-card); border-radius: 16px; padding: 24px;
            margin-bottom: 30px; border: 1px solid rgba(124, 58, 238, 0.2);
        }
        .notes-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .notes-table th {
            text-align: left; padding: 12px 8px; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            cursor: pointer; white-space: nowrap;
        }
        .notes-table th:hover { color: var(--text-primary); }
        .notes-table th.sorted { color: var(--accent); }
        .notes-table td { padding: 12px 8px; border-bottom: 1px solid rgba(124, 58, 237, 0.1); vertical-align: middle; }
        .notes-table tr:hover { background: rgba(124, 58, 237, 0.05); }

        .col-content { width: 45%; }
        .col-type { width: 8%; }
        .col-likes { width: 12%; }
        .col-collects { width: 12%; }
        .col-comments { width: 12%; }
        .col-time { width: 11%; }

        .note-content { display: flex; gap: 12px; align-items: flex-start; }
        .note-thumb {
            width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
            background: rgba(124, 58, 237, 0.2); flex-shrink: 0;
        }
        .note-info { min-width: 0; flex: 1; }
        .note-info h4 {
            font-size: 14px; font-weight: 500; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .note-info h4 a { color: inherit; text-decoration: none; }
        .note-info h4 a:hover { color: var(--accent); text-decoration: underline; }
        .note-info .meta { font-size: 12px; color: var(--text-secondary); }
        .note-type {
            display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px;
            background: rgba(124, 58, 237, 0.2); color: var(--text-secondary);
        }
        .note-type.video { background: rgba(239, 68, 68, 0.2); color: #FCA5A5; }

        .stat-value { font-weight: 500; font-size: 14px; }
        .time-text { font-size: 13px; color: var(--text-secondary); }

        /* Insights Section */
        .insights-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .insight-card {
            background: var(--bg-card); border-radius: 16px; padding: 24px;
            border: 1px solid rgba(124, 58, 238, 0.2);
        }
        .insight-card h3 {
            font-size: 16px; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .insight-list { list-style: none; }
        .insight-list li {
            padding: 12px 0; border-bottom: 1px solid rgba(124, 58, 237, 0.1);
            font-size: 14px; line-height: 1.6; display: flex; gap: 12px;
        }
        .insight-list li:last-child { border-bottom: none; }
        .insight-list .bullet { color: var(--accent); font-weight: 600; }

        /* Loading State */
        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px; color: var(--text-secondary);
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(124, 58, 237, 0.3); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center; padding: 30px 0; color: var(--text-secondary);
            font-size: 14px; border-top: 1px solid rgba(124, 58, 237, 0.2);
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 16px; text-align: center; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .notes-table { font-size: 12px; }
            .notes-table th, .notes-table td { padding: 8px 4px; }
            .note-thumb { width: 40px; height: 40px; }
            .col-content { width: 50%; }
            .col-type, .col-comments { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📊</div>
                <h1>小红书糖尿病爆款雷达</h1>
            </div>
            <div class="header-actions">
                <span class="update-time" id="updateTime">最后更新：加载中...</span>
                <button class="btn btn-primary" onclick="refreshData()">
                    <span>🔄</span> 立即刷新
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="label">监控笔记总数</div>
                <div class="value" id="totalNotes">--</div>
            </div>
            <div class="stat-card">
                <div class="label">本周新增</div>
                <div class="value" id="weeklyNew">--</div>
            </div>
            <div class="stat-card">
                <div class="label">平均点赞</div>
                <div class="value" id="avgLikes">--</div>
            </div>
            <div class="stat-card">
                <div class="label">最高点赞</div>
                <div class="value" id="maxLikes">--</div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <div class="section-header">
                <h2 class="section-title">📈 话题热度对比</h2>
                <span style="color: var(--text-secondary); font-size: 14px;">点击柱状图筛选笔记</span>
            </div>
            <div class="chart-container">
                <canvas id="topicChart"></canvas>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">关键词：</span>
                <button class="filter-btn active" data-keyword="全部" onclick="filterByKeyword('全部')">全部</button>
                <button class="filter-btn" data-keyword="1型糖" onclick="filterByKeyword('1型糖')">1型糖</button>
                <button class="filter-btn" data-keyword="2型糖" onclick="filterByKeyword('2型糖')">2型糖</button>
                <button class="filter-btn" data-keyword="胰岛素泵" onclick="filterByKeyword('胰岛素泵')">胰岛素泵</button>
                <button class="filter-btn" data-keyword="CGM" onclick="filterByKeyword('CGM')">CGM</button>
                <button class="filter-btn" data-keyword="美敦力" onclick="filterByKeyword('美敦力')">美敦力</button>
                <button class="filter-btn" data-keyword="糖尿病" onclick="filterByKeyword('糖尿病')">糖尿病</button>
            </div>
            <div class="filter-group">
                <span class="filter-label">时间：</span>
                <select class="time-select" id="timeSelect" onchange="filterByTime()">
                    <option value="all">全部时间</option>
                    <option value="week">近一周</option>
                    <option value="month">近一月</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">排序：</span>
                <select class="sort-select" id="sortSelect" onchange="sortNotes()">
                    <option value="likes">👍 点赞量</option>
                    <option value="collects">⭐ 收藏量</option>
                    <option value="comments">💬 评论量</option>
                    <option value="time">🕐 时间</option>
                </select>
            </div>
        </div>

        <!-- Notes List -->
        <div class="notes-section">
            <div class="section-header">
                <h2 class="section-title">📋 爆款笔记榜单</h2>
                <span id="notesCount" style="color: var(--text-secondary); font-size: 14px;">共 0 条</span>
            </div>
            <div style="background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: #ffc107; font-size: 14px;">
    <span style="margin-right: 8px;">⚠️</span>当前显示的是示例数据，<a href="#" onclick="alert('请配置 GitHub Secrets: XHS_MCP_URL 以启用真实数据抓取'); return false;" style="color: #ffc107; text-decoration: underline;">点击了解如何配置</a>
</div>
                    <table class="notes-table">
                <thead>
                    <tr>
                        <th class="col-content">内容</th>
                        <th class="col-type">类型</th>
                        <th class="col-likes" onclick="sortNotes('likes')">👍 点赞</th>
                        <th class="col-collects" onclick="sortNotes('collects')">⭐ 收藏</th>
                        <th class="col-comments" onclick="sortNotes('comments')">💬 评论</th>
                        <th class="col-time" onclick="sortNotes('time')">时间</th>
                    </tr>
                </thead>
                <tbody id="notesTableBody">
                    <tr>
                        <td colspan="6">
                            <div class="loading">
                                <div class="loading-spinner"></div>
                                <span>数据加载中...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Insights Section -->
        <div class="insights-section">
            <div class="insight-card">
                <h3>💡 核心洞察</h3>
                <ul class="insight-list" id="insightsList">
                    <li><span class="bullet">•</span> 数据加载中...</li>
                </ul>
            </div>
            <div class="insight-card">
                <h3>🏆 爆款因素总结</h3>
                <ul class="insight-list" id="factorsList">
                    <li><span class="bullet">•</span> 数据加载中...</li>
                </ul>
            </div>
        </div>

        <footer>
            <p>📊 小红书糖尿病爆款雷达 | 每周一自动更新 | <a href="https://jiangjiehui.top/" target="_blank">返回首页</a></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        const KEYWORDS = ['1型糖', '2型糖', '胰岛素泵', 'CGM', '美敦力', '糖尿病'];
        let allNotes = [];
        let filteredNotes = [];
        let currentKeyword = '全部';
        let currentTimeFilter = 'all';
        let currentSort = 'likes';
        let chart = null;

        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
            return num.toString();
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            if (diff < 86400000) return '今天';
            else if (diff < 172800000) return '昨天';
            else if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            else return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        async function loadData() {
            try {
                const response = await fetch('./data/radar-data-v4.json');
                const data = await response.json();
                
                allNotes = data.notes || [];
                filteredNotes = [...allNotes];
                
                updateStats(data);
                updateChart(data);
                updateInsights(data);
                applyFilters();
                
                document.getElementById('updateTime').textContent = 
                    '最后更新：' + new Date(data.updatedAt).toLocaleString('zh-CN');
            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('notesTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">数据加载失败，请稍后重试</td></tr>';
            }
        }

        function updateStats(data) {
            const totalNotes = allNotes.length;
            const avgLikes = totalNotes > 0 ? Math.round(allNotes.reduce((sum, n) => sum + (n.likes || 0), 0) / totalNotes) : 0;
            const maxLikes = totalNotes > 0 ? Math.max(...allNotes.map(n => n.likes || 0)) : 0;
            const weekAgo = Date.now() / 1000 - 7 * 86400;
            const weeklyNew = allNotes.filter(n => n.time > weekAgo).length;

            document.getElementById('totalNotes').textContent = formatNumber(totalNotes);
            document.getElementById('weeklyNew').textContent = formatNumber(weeklyNew);
            document.getElementById('avgLikes').textContent = formatNumber(avgLikes);
            document.getElementById('maxLikes').textContent = formatNumber(maxLikes);
        }

        function updateChart(data) {
            const ctx = document.getElementById('topicChart').getContext('2d');
            const keywordCounts = data.keywordCounts || {};
            const keywordStats = KEYWORDS.map(keyword => ({
                keyword,
                count: keywordCounts[keyword] || 0
            }));

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: keywordStats.map(s => s.keyword),
                    datasets: [{
                        label: '笔记数量',
                        data: keywordStats.map(s => s.count),
                        backgroundColor: [
                            'rgba(124, 58, 237, 0.8)',
                            'rgba(139, 92, 246, 0.8)',
                            'rgba(167, 139, 250, 0.8)',
                            'rgba(192, 132, 252, 0.8)',
                            'rgba(216, 180, 254, 0.8)',
                            'rgba(233, 213, 255, 0.8)'
                        ],
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const keyword = keywordStats[index].keyword;
                            filterByKeyword(keyword);
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 10, 26, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#A78BFA',
                            borderColor: 'rgba(124, 58, 237, 0.5)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                title: (items) => items[0].label + ' 话题',
                                label: (item) => '笔记数量：' + item.raw + ' 篇'
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#A78BFA' } },
                        y: { grid: { color: 'rgba(124, 58, 237, 0.1)' }, ticks: { color: '#A78BFA', stepSize: 1 }, beginAtZero: true }
                    }
                }
            });
        }

        function updateInsights(data) {
            const insights = data.insights || generateInsights();
            document.getElementById('insightsList').innerHTML = insights.map(i => '<li><span class="bullet">•</span> ' + i + '</li>').join('');

            const factors = data.factors || generateFactors();
            document.getElementById('factorsList').innerHTML = factors.map(f => '<li><span class="bullet">✓</span> ' + f + '</li>').join('');
        }

        function generateInsights() {
            const insights = [];
            const topLiked = [...allNotes].sort((a, b) => (b.likes || 0) - (a.likes || 0))[0];
            if (topLiked) {
                insights.push('最高点赞笔记是《' + (topLiked.title || '').substring(0, 15) + '》，获得 ' + formatNumber(topLiked.likes || 0) + ' 赞');
            }
            const highCollectRate = [...allNotes].filter(n => n.likes > 100).sort((a, b) => ((b.collects || 0) / (b.likes || 1)) - ((a.collects || 0) / (a.likes || 1)))[0];
            if (highCollectRate) {
                const rate = ((highCollectRate.collects || 0) / (highCollectRate.likes || 1) * 100).toFixed(1);
                insights.push('收藏率最高笔记收藏/点赞比达 ' + rate + '%，说明内容实用性强');
            }
            return insights.length > 0 ? insights : ['暂无足够数据生成洞察'];
        }

        function generateFactors() {
            return [
                '真实经历分享：糖友亲身经历更容易引发共鸣',
                '实用干货攻略：血糖管理技巧、饮食建议收藏率高',
                '设备测评对比：胰岛素泵、CGM设备对比类内容受欢迎',
                '情感支持类：给予糖友群体情感支持的内容互动好',
                '视觉呈现精美：高质量图片和视频封面点击率更高',
                '标题关键词优化：包含具体数字和痛点词汇提升曝光'
            ];
        }

        function filterByKeyword(keyword) {
            currentKeyword = keyword;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.keyword === keyword);
            });
            applyFilters();
        }

        function filterByTime() {
            currentTimeFilter = document.getElementById('timeSelect').value;
            applyFilters();
        }

        function applyFilters() {
            let result = [...allNotes];
            
            // 关键词筛选
            if (currentKeyword !== '全部') {
                result = result.filter(n => n.keyword === currentKeyword);
            }
            
            // 时间筛选
            const now = Date.now() / 1000;
            if (currentTimeFilter === 'week') {
                result = result.filter(n => n.time > now - 7 * 86400);
            } else if (currentTimeFilter === 'month') {
                result = result.filter(n => n.time > now - 30 * 86400);
            }
            
            filteredNotes = result;
            sortNotes();
        }

        function sortNotes(sortBy) {
            if (sortBy) {
                currentSort = sortBy;
                document.getElementById('sortSelect').value = sortBy;
            }
            filteredNotes.sort((a, b) => {
                switch (currentSort) {
                    case 'likes': return (b.likes || 0) - (a.likes || 0);
                    case 'collects': return (b.collects || 0) - (a.collects || 0);
                    case 'comments': return (b.comments || 0) - (a.comments || 0);
                    case 'time': return (b.time || 0) - (a.time || 0);
                    default: return 0;
                }
            });
            renderNotes();
        }

        function renderNotes() {
            const tbody = document.getElementById('notesTableBody');
            document.getElementById('notesCount').textContent = '共 ' + filteredNotes.length + ' 条';
            
            if (filteredNotes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = filteredNotes.slice(0, 50).map(note => {
                const hasRealLink = note.url && note.url.startsWith('http');
                const linkUrl = hasRealLink ? note.url : '#';
                const linkTarget = hasRealLink ? ' target="_blank" rel="noopener"' : '';
                const linkOnclick = hasRealLink ? '' : ' onclick="alert(\'暂无真实笔记链接，请先配置小红书MCP接口\'); return false;"';
                
                return '<tr>' +
                    '<td class="col-content">' +
                        '<div class="note-content">' +
                            '<img class="note-thumb" src="' + (note.cover || 'https://via.placeholder.com/60x60/7C3AED/FFFFFF?text=图') + '" alt="封面" onerror="this.src=\'https://via.placeholder.com/60x60/7C3AED/FFFFFF?text=图\'">' +
                            '<div class="note-info">' +
                                '<h4><a href="' + linkUrl + '"' + linkTarget + linkOnclick + '>' + (note.title || '无标题') + '</a></h4>' +
                                '<div class="meta">👤 ' + (note.author || '匿名') + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</td>' +
                    '<td class="col-type"><span class="note-type ' + (note.type === 'video' ? 'video' : '') + '">' + (note.type === 'video' ? '🎬' : '📷') + '</span></td>' +
                    '<td class="col-likes"><span class="stat-value">' + formatNumber(note.likes || 0) + '</span></td>' +
                    '<td class="col-collects"><span class="stat-value">' + formatNumber(note.collects || 0) + '</span></td>' +
                    '<td class="col-comments"><span class="stat-value">' + formatNumber(note.comments || 0) + '</span></td>' +
                    '<td class="col-time"><span class="time-text">' + formatTime(note.time) + '</span></td>' +
                '</tr>';
            }).join('');
        }

        function refreshData() {
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> 刷新中...';
            alert('刷新请求已发送，页面将在几秒后刷新...');
            setTimeout(() => { window.location.reload(); }, 5000);
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
